version: 2.1

jobs:
  backend-build-test:
    docker:
      - image: cimg/openjdk:11.0
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-backend-{{ checksum "backend/pom.xml" }}
      - run:
          name: Build and test backend
          command: cd backend && mvn clean verify
      - save_cache:
          paths:
            - ~/.m2
          key: v1-backend-{{ checksum "backend/pom.xml" }}
      - store_test_results:
          path: backend/target/surefire-reports

  frontend-build-test:
    docker:
      - image: cimg/node:18.17
    steps:
      - checkout
      - restore_cache:
          keys:
            - v1-frontend-{{ checksum "frontend/package-lock.json" }}
      - run:
          name: Install dependencies
          command: cd frontend && npm ci
      - save_cache:
          paths:
            - frontend/node_modules
          key: v1-frontend-{{ checksum "frontend/package-lock.json" }}
      - run:
          name: Run tests
          command: cd frontend && npm test
      - run:
          name: Build
          command: cd frontend && npm run build

  docker-build-push:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - setup_remote_docker:
          version: 20.10.24
      - run:
          name: Build and push backend image
          command: |
            echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin
            docker build -t $DOCKER_USERNAME/random-jokes-backend:$CIRCLE_SHA1 ./backend
            docker tag $DOCKER_USERNAME/random-jokes-backend:$CIRCLE_SHA1 $DOCKER_USERNAME/random-jokes-backend:latest
            docker push $DOCKER_USERNAME/random-jokes-backend:$CIRCLE_SHA1
            docker push $DOCKER_USERNAME/random-jokes-backend:latest
      - run:
          name: Build and push frontend image
          command: |
            docker build \
              --build-arg VITE_API_BASE_URL=$VITE_API_BASE_URL \
              -t $DOCKER_USERNAME/random-jokes-frontend:$CIRCLE_SHA1 ./frontend
            docker tag $DOCKER_USERNAME/random-jokes-frontend:$CIRCLE_SHA1 $DOCKER_USERNAME/random-jokes-frontend:latest
            docker push $DOCKER_USERNAME/random-jokes-frontend:$CIRCLE_SHA1
            docker push $DOCKER_USERNAME/random-jokes-frontend:latest

workflows:
  build-test-deploy:
    jobs:
      - backend-build-test
      - frontend-build-test
      - docker-build-push:
          requires:
            - backend-build-test
            - frontend-build-test
          filters:
            branches:
              only: main
